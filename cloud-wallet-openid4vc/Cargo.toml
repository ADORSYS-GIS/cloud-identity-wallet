[package]
name = "cloud-wallet-openid4vc"
version = "0.1.0"
license.workspace = true
edition.workspace = true

[features]
default = []
encryption = ["cloud-wallet-crypto", "zeroize"]

postgres = ["dep:sqlx-core","dep:sqlx-postgres","sqlx-core/tokio","sqlx-core/rustls","sqlx-core/webpki-roots","sqlx-postgres/time","sqlx-postgres/uuid"]

[dependencies]
thiserror.workspace = true
color-eyre.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = "1"
uuid.workspace = true
time.workspace = true
futures = "0.3"

# Encryption feature
sqlx-core = { version = "0.8", default-features = false, optional = true }
sqlx-postgres = { version = "0.8", default-features = false, optional = true }

cloud-wallet-crypto = { path = "../cloud-wallet-crypto", optional = true }
zeroize = { version = "1.8", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
