[package]
name = "cloud-wallet-openid4vc"
version = "0.1.0"
license.workspace = true
edition.workspace = true

[features]
default = []
encryption = ["cloud-wallet-crypto", "zeroize"]
postgres = ["sqlx", "sqlx/runtime-tokio-rustls", "sqlx/postgres", "sqlx/time", "sqlx/uuid"]

[dependencies]
thiserror.workspace = true
color-eyre.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = "1"
uuid.workspace = true
time.workspace = true
futures = "0.3"

# Encryption feature
cloud-wallet-crypto = { path = "../cloud-wallet-crypto", optional = true }
zeroize = { version = "1.8", optional = true }

# Postgres feature
sqlx = { version = "0.8", default-features = false, optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "postgres", "time", "uuid", "migrate"] }
