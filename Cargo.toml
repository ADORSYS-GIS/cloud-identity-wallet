[workspace]
resolver = "2"

members = ["cloud-wallet-crypto", "cloud-wallet-events", "cloud-wallet-openid4vc"]

[workspace.package]
version = "0.1.0"
edition = "2024"
readme = "README.md"
license = "MIT OR Apache-2.0"

[workspace.lints.clippy]

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.rustdoc]
broken_intra_doc_links = "deny"
invalid_html_tags = "deny"

[workspace.dependencies]
# Serialization / Deserialization
serde = "1"
serde_json = "1"

# Error handling
color-eyre = "0.6"
thiserror = "2"

# Configuration
config = "0.15"

# Logging and metrics
tracing = "0.1"

uuid = { version = "1", features = ["v4", "serde"] }
time = { version = "0.3", features = ["macros", "serde-well-known"] }
url = { version = "2.5", features = ["serde"] }

[profile.dev]
# Speed up compilation time
debug = 1

[profile.release]
strip = "symbols"
lto = "fat"
# Abort on panic
panic = "abort"
# Maximize runtime speed
codegen-units = 1
