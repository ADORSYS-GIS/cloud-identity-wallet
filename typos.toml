  "crates/cloud-wallet-crypto/src/jwk/tests.rs",
  "crates/cloud-wallet-openid4vc/test_data/issuer_metadata.json",
  "crates/cloud-wallet-openid4vc/test_data/sd_jwt/",
  "crates/cloud-wallet-openid4vc/src/formats/sd_jwt/metadata.rs",
  "crates/cloud-wallet-openid4vc/src/oid4vp/authorization/request.rs",
]
