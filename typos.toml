[default]
extend-ignore-identifiers-re = []

[default.extend-identifiers]

[default.extend-words]
# COSE (CBOR Object Signing and Encryption) is an IETF standard
COSE = "COSE"
Cose = "Cose"
cose = "cose"
# MIGH is part of PEM private key format (ASN.1 header), not a typo
MIGH = "MIGH"
fwe = "fwe"

