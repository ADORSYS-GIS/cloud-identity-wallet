[advisories]
ignore = [
    # Present in rsa crate. As there is currently no available fix for this vulnerability,
    # this change temporarily ignores the advisory to allow CI/CD pipelines to pass
    "RUSTSEC-2023-0071"
]  # advisory IDs to ignore

informational_warnings = ["unmaintained"]
severity_threshold = "low"

# Output Configuration
[output]
deny = []  # Don't exit on error for any informational categories
format = "terminal"  # "terminal" (human readable report) or "json"
quiet = false  # Only print information on error

[yanked]
enabled = true  # Warn for yanked crates in Cargo.lock
update_index = true  # Auto-update the crates.io index
